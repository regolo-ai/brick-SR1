# ─── Decisions ───────────────────────────────────────────────
# Priority cascade: Keyword (200-130) > Complexity (120-105) > Domain (100-50) > default_model (1)
#
# Keyword decisions fire on explicit intent words in the query.
# Domain decisions fire on ModernBERT classification when no keyword matched.
# default_model is the hardcoded safety net if nothing fires.
strategy: "priority"

decisions:
  # ═══ KEYWORD-BASED DECISIONS (high priority) ═══════════════

  - name: "simple_chat"
    description: "Greetings and simple acknowledgments"
    priority: 200
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "greeting_simple"
    modelRefs:
      - model: "qwen3-8b"
        use_reasoning: false

  - name: "formatting_tasks"
    description: "Text formatting and structural edits"
    priority: 180
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "formatting_keywords"
    modelRefs:
      - model: "mistral-small3.2"
        use_reasoning: false
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: false
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5

  - name: "coding_tasks"
    description: "Programming and code generation"
    priority: 170
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "code_keywords"
    modelRefs:
      - model: "qwen3-coder-next"
        use_reasoning: false

  - name: "math_reasoning"
    description: "Math problems requiring step-by-step reasoning"
    priority: 160
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "math_keywords"
    modelRefs:
      - model: "gpt-oss-120b"
        use_reasoning: true
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: true
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5

  - name: "creative_writing"
    description: "Stories, poems, and creative content"
    priority: 150
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "creative_keywords"
    modelRefs:
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: false

  - name: "deep_reasoning"
    description: "Complex reasoning and logical deduction"
    priority: 140
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "reasoning_keywords"
    modelRefs:
      - model: "gpt-oss-120b"
        use_reasoning: true
        reasoning_effort: "high"
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: true
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5

  - name: "analysis_medium"
    description: "Analysis, comparison, and evaluation tasks"
    priority: 130
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "analysis_keywords"
    modelRefs:
      - model: "mistral-small3.2"
        use_reasoning: false
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: false
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5

  # ═══ COMPLEXITY-BASED DECISIONS ════════════════════════════
  # Fire on embedding-based complexity signal from Qwen3-Embedding.

  - name: "hard_code"
    description: "Complex coding tasks detected by complexity signal"
    priority: 120
    rules:
      operator: "AND"
      conditions:
        - type: "complexity"
          name: "code-complexity:hard"
    modelRefs:
      - model: "qwen3-coder-next"
        use_reasoning: false

  - name: "easy_code"
    description: "Simple coding tasks detected by complexity signal"
    priority: 115
    rules:
      operator: "AND"
      conditions:
        - type: "complexity"
          name: "code-complexity:easy"
    modelRefs:
      - model: "qwen3-coder-next"
        use_reasoning: false

  - name: "medium_code"
    description: "Medium coding tasks detected by complexity signal"
    priority: 110
    rules:
      operator: "AND"
      conditions:
        - type: "complexity"
          name: "code-complexity:medium"
    modelRefs:
      - model: "qwen3-coder-next"
        use_reasoning: false

  - name: "hard_reasoning"
    description: "Hard reasoning tasks detected by complexity signal"
    priority: 105
    rules:
      operator: "AND"
      conditions:
        - type: "complexity"
          name: "reasoning-complexity:hard"
    modelRefs:
      - model: "gpt-oss-120b"
        use_reasoning: true

  # ═══ DOMAIN-BASED DECISIONS (lower priority) ═══════════════
  # Fire when no keyword matched but ModernBERT classifies the domain.

  - name: "domain_stem"
    description: "STEM domains — math, CS, physics, engineering, chemistry"
    priority: 100
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "math"
        - type: "domain"
          name: "computer_science"
        - type: "domain"
          name: "physics"
        - type: "domain"
          name: "engineering"
        - type: "domain"
          name: "chemistry"
    modelRefs:
      - model: "gpt-oss-120b"
        use_reasoning: true
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: true
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5

  - name: "domain_humanities"
    description: "Humanities — history, philosophy, law"
    priority: 90
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "history"
        - type: "domain"
          name: "philosophy"
        - type: "domain"
          name: "law"
    modelRefs:
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: false

  - name: "domain_business"
    description: "Business and economics"
    priority: 80
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "business"
        - type: "domain"
          name: "economics"
    modelRefs:
      - model: "mistral-small3.2"
        use_reasoning: false

  - name: "domain_science"
    description: "Life sciences — biology, health, psychology"
    priority: 70
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "biology"
        - type: "domain"
          name: "health"
        - type: "domain"
          name: "psychology"
    modelRefs:
      - model: "mistral-small3.2"
        use_reasoning: false
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: false
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5

  - name: "easy_general"
    description: "Easy general queries detected by complexity signal"
    priority: 55
    rules:
      operator: "AND"
      conditions:
        - type: "complexity"
          name: "reasoning-complexity:easy"
        - type: "domain"
          name: "other"
    modelRefs:
      - model: "qwen3-8b"
        use_reasoning: false

  - name: "domain_general"
    description: "General/miscellaneous domain"
    priority: 50
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "other"
    modelRefs:
      - model: "mistral-small3.2"
        use_reasoning: false
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: false
      - model: "gpt-oss-120b"
        use_reasoning: false
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5
