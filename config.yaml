# ─── Language Rules ──────────────────────────────────────────
language_rules:
  - name: "en"
    description: "English"
  - name: "it"
    description: "Italian"
  - name: "zh"
    description: "Chinese (Simplified or Traditional)"

# ─── Context Rules ───────────────────────────────────────────
context_rules:
  - name: "short_context"
    min_tokens: "0"
    max_tokens: "1K"
    description: "Brief queries (0-1000 tokens)"
  - name: "long_context"
    min_tokens: "4K"
    max_tokens: "128K"
    description: "Long documents (4000-128000 tokens)"

# ─── Categories (MMLU 14-class) ─────────────────────────────
