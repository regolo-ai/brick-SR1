# ─── Brick Configuration ─────────────────────────────────────
# Virtual multimodal routing model that exposes a single "brick" endpoint.
# Detects modality (text/audio/image), preprocesses, and routes to 8 models on Regolo API.
#
# Routing pipeline: Keyword (high pri) > Complexity signal (mid) > Domain classifier (low) > default_model
# Keywords are bilingual EN+IT; domain classification via ModernBERT (MMLU 14-cat).
# Complexity signal via Qwen3-Embedding-0.6B cosine similarity (50-100ms).

# Virtual model identity — what clients see when calling /v1/models
model:
  name: "brick"
  description: "Virtual multimodal routing model"

# MyModel provider (for API key resolution in brick handler)
providers:
  regoloai:
    type: openai-compatible
    base_url: https://api.regolo.ai/v1
    api_key: ${REGOLO_API_KEY}

# Brick multimodal gateway configuration
brick:
  enabled: true
  stt_model: "faster-whisper-large-v3"
  stt_endpoint: "https://api.regolo.ai/v1/audio/transcriptions"
  ocr_model: "deepseek-ocr"
  ocr_endpoint: "https://api.regolo.ai/v1/chat/completions"
  vision_model: "qwen3-vl-32b"
  vision_endpoint: "https://api.regolo.ai/v1/chat/completions"
  ocr_min_text_length: 10

# Server configuration
server_port: 8000

# Auto model name — used internally when brick rewrites "brick" for the pipeline
auto_model_name: "brick"

# ─── Backend Models ─────────────────────────────────────────
# 8 models, all served by Regolo API via a single provider profile

provider_profiles:
  regolo:
    type: openai
    base_url: https://api.regolo.ai/v1

vllm_endpoints:
  - name: "regolo"
    provider_profile: "regolo"
    weight: 1

default_model: "mistral-small3.2"

model_config:
  qwen3-8b:
    preferred_endpoints: ["regolo"]
    param_size: "8b"
  gpt-oss-20b:
    preferred_endpoints: ["regolo"]
    param_size: "20b"
  gpt-oss-120b:
    preferred_endpoints: ["regolo"]
    param_size: "120b"
    reasoning_family: "qwen3"
  qwen3-coder-next:
    preferred_endpoints: ["regolo"]
    param_size: "32b"
  Llama-3.3-70B-Instruct:
    preferred_endpoints: ["regolo"]
    param_size: "70b"
  mistral-small3.2:
    preferred_endpoints: ["regolo"]
    param_size: "24b"
  gemma-3-27b-it:
    preferred_endpoints: ["regolo"]
    param_size: "27b"

# ─── Reasoning Families ──────────────────────────────────────
reasoning_families:
  qwen3:
    type: "chat_template_kwargs"
    parameter: "enable_thinking"

default_reasoning_effort: "medium"

# ─── Embedding Models (Qwen3-Embedding for Complexity Signal) ─
embedding_models:
  qwen3_model_path: "models/mom-embedding-pro"
  use_cpu: true
  hnsw_config:
    model_type: "qwen3"
    preload_embeddings: true
    enable_soft_matching: true
    min_score_threshold: 0.5

# ─── Domain Classifier (ModernBERT) ─────────────────────────
# Runs locally in the container via Rust/Candle. Model (~400MB) is downloaded
# automatically from HuggingFace on first startup. Produces domain signals
# consumed by type: "domain" conditions in decisions.
classifier:
  category_model:
    model_id: "models/mom-domain-classifier"
    use_modernbert: true
    threshold: 0.6
    use_cpu: true
    category_mapping_path: "models/mom-domain-classifier/category_mapping.json"

# ─── Signals: Keyword Rules (EN + IT) ───────────────────────
# 7 bilingual rule groups. The router does case-insensitive word-boundary matching.
# No "easy_questions" rule — generic words (what, how, when) misroute hard queries to small models.
keyword_rules:
  - name: "greeting_simple"
    operator: "OR"
    keywords:
      - "hello"
      - "hi"
      - "thanks"
      - "thank you"
      - "ok"
      - "sure"
      - "yes"
      - "no"
      - "ciao"
      - "grazie"
      - "va bene"
    case_sensitive: false

  - name: "code_keywords"
    operator: "OR"
    keywords:
      - "code"
      - "implement"
      - "debug"
      - "algorithm"
      - "python"
      - "javascript"
      - "class"
      - "refactor"
      - "compile"
      - "API"
      - "script"
      - "codice"
      - "programma"
      - "funzione"
      - "implementa"
    case_sensitive: false

  - name: "math_keywords"
    operator: "OR"
    keywords:
      - "calculate"
      - "equation"
      - "solve"
      - "proof"
      - "theorem"
      - "integral"
      - "derivative"
      - "matrix"
      - "calculus"
      - "function"
      - "calcola"
      - "equazione"
      - "risolvi"
      - "dimostra"
      - "derivata"
      - "integrale"
      - "teorema"
    case_sensitive: false

  - name: "creative_keywords"
    operator: "OR"
    keywords:
      - "story"
      - "poem"
      - "write a"
      - "creative"
      - "narrative"
      - "character"
      - "dialogue"
      - "fiction"
      - "racconta"
      - "storia"
      - "poesia"
      - "narrativa"
      - "personaggio"
    case_sensitive: false

  - name: "analysis_keywords"
    operator: "OR"
    keywords:
      - "analyze"
      - "compare"
      - "evaluate"
      - "difference between"
      - "opinion"
      - "advice"
      - "summarize"
      - "analizza"
      - "confronta"
      - "valuta"
      - "differenza tra"
      - "consiglio"
    case_sensitive: false

  - name: "reasoning_keywords"
    operator: "OR"
    keywords:
      - "deduce"
      - "reason"
      - "chain of thought"
      - "think deeply"
      - "hypothesis"
      - "prova che"
      - "deduzione"
      - "ragiona"
      - "teoria"
      - "ipotesi"
    case_sensitive: false

  - name: "formatting_keywords"
    operator: "OR"
    keywords:
      - "format"
      - "capitalize"
      - "lowercase"
      - "paragraph"
      - "bullet"
      - "markdown"
      - "postscript"
      - "P.S."
    case_sensitive: false

# ─── Complexity Rules (Embedding-based) ──────────────────────
# Uses cosine similarity between query embedding and exemplar embeddings.
# signal = max_hard_sim - max_easy_sim; threshold determines classification.
complexity_rules:
  - name: "reasoning-complexity"
    description: "Classify reasoning and problem-solving tasks"
    threshold: 0.3
    hard:
      candidates:
        # Analytical reasoning
        - "Analyze the geopolitical implications of renewable energy adoption"
        - "Evaluate the ethical considerations of AI in healthcare decision-making"
        - "Compare and contrast the philosophical frameworks of Kant and Hegel"
        - "Propose solutions for traffic congestion in urban environments"
        # Science & math reasoning
        - "Explain quantum entanglement and its applications in cryptography"
        - "Derive the Navier-Stokes equations from first principles"
        - "Prove that there are infinitely many prime numbers"
        - "Explain the thermodynamic basis of entropy in information theory"
        # Multi-step logic
        - "Design a multi-stage marketing strategy for a new product launch"
        - "Evaluate the long-term economic impact of universal basic income"
        - "Analyze the trade-offs between microservices and monolithic architecture"
        - "Discuss how game theory applies to international climate negotiations"
    easy:
      candidates:
        # Factual recall
        - "What is the capital of France?"
        - "How many days are in a week?"
        - "What color is the sky on a clear day?"
        - "Name three common pets"
        - "What is 5 + 3?"
        # Simple definitions
        - "What does HTML stand for?"
        - "Who painted the Mona Lisa?"
        - "What is the largest planet in our solar system?"
        - "How many continents are there?"
        - "What language is spoken in Brazil?"
        # Simple tasks
        - "Say hello in Spanish"
        - "List the days of the week"

  - name: "code-complexity"
    description: "Classify coding tasks by complexity"
    threshold: 0.3
    hard:
      candidates:
        # Systems programming
        - "Implement a distributed lock manager with leader election"
        - "Design a database migration system with rollback support"
        - "Create a compiler optimization pass for loop unrolling"
        - "Build a graph algorithm for strongly connected components"
        - "Develop a custom memory allocator with fragmentation handling"
        # Architecture & design
        - "Implement a concurrent garbage collector"
        - "Build a consensus algorithm for a distributed system"
        - "Design an event-driven architecture with CQRS and event sourcing"
        - "Implement a B-tree with concurrent read-write support"
        - "Create a rate limiter with sliding window and distributed state"
    easy:
      candidates:
        # Basic tasks
        - "Write a function to reverse a string"
        - "Create a class to represent a rectangle"
        - "Implement a simple counter with increment/decrement"
        - "Write a function to check if a number is even"
        - "Create a basic TODO list with add/remove operations"
        # Trivial snippets
        - "Write a for loop that prints numbers 1 to 10"
        - "Create a hello world program"
        - "Sort a list of numbers"
        - "Write a function that returns the maximum of two numbers"
        - "Convert a string to uppercase"
    composer:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "computer_science"
        - type: "keyword"
          name: "code_keywords"

# ─── Language Rules ──────────────────────────────────────────
language_rules:
  - name: "en"
    description: "English"
  - name: "it"
    description: "Italian"
  - name: "zh"
    description: "Chinese (Simplified or Traditional)"

# ─── Context Rules ───────────────────────────────────────────
context_rules:
  - name: "short_context"
    min_tokens: "0"
    max_tokens: "1K"
    description: "Brief queries (0-1000 tokens)"
  - name: "long_context"
    min_tokens: "4K"
    max_tokens: "128K"
    description: "Long documents (4000-128000 tokens)"

# ─── Categories (MMLU 14-class) ─────────────────────────────
# Maps domain classifier output to named categories used in decisions.
categories:
  - name: computer_science
    description: "Computer science and programming"
    mmlu_categories: ["computer_science"]
  - name: math
    description: "Mathematics"
    mmlu_categories: ["math"]
  - name: physics
    description: "Physics"
    mmlu_categories: ["physics"]
  - name: engineering
    description: "Engineering"
    mmlu_categories: ["engineering"]
  - name: chemistry
    description: "Chemistry"
    mmlu_categories: ["chemistry"]
  - name: biology
    description: "Biology and life sciences"
    mmlu_categories: ["biology"]
  - name: health
    description: "Health and medicine"
    mmlu_categories: ["health"]
  - name: economics
    description: "Economics and finance"
    mmlu_categories: ["economics"]
  - name: business
    description: "Business and management"
    mmlu_categories: ["business"]
  - name: law
    description: "Law and legal topics"
    mmlu_categories: ["law"]
  - name: psychology
    description: "Psychology"
    mmlu_categories: ["psychology"]
  - name: history
    description: "History and culture"
    mmlu_categories: ["history"]
  - name: philosophy
    description: "Philosophy and ethics"
    mmlu_categories: ["philosophy"]
  - name: other
    description: "General / miscellaneous"
    mmlu_categories: ["other"]

# ─── Decisions ───────────────────────────────────────────────
# Priority cascade: Keyword (200-130) > Domain (100-50) > default_model (1)
#
# Keyword decisions fire on explicit intent words in the query.
# Domain decisions fire on ModernBERT classification when no keyword matched.
# default_model is the hardcoded safety net if nothing fires.
strategy: "priority"

decisions:
  # ═══ KEYWORD-BASED DECISIONS (high priority) ═══════════════

  - name: "simple_chat"
    description: "Greetings and simple acknowledgments"
    priority: 200
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "greeting_simple"
    modelRefs:
      - model: "qwen3-8b"
        use_reasoning: false

  - name: "formatting_tasks"
    description: "Text formatting and structural edits"
    priority: 180
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "formatting_keywords"
    modelRefs:
      - model: "mistral-small3.2"
        use_reasoning: false
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: false
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5

  - name: "coding_tasks"
    description: "Programming and code generation"
    priority: 170
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "code_keywords"
    modelRefs:
      - model: "qwen3-coder-next"
        use_reasoning: false

  - name: "math_reasoning"
    description: "Math problems requiring step-by-step reasoning"
    priority: 160
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "math_keywords"
    modelRefs:
      - model: "gpt-oss-120b"
        use_reasoning: true
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: true
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5

  - name: "creative_writing"
    description: "Stories, poems, and creative content"
    priority: 150
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "creative_keywords"
    modelRefs:
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: false

  - name: "deep_reasoning"
    description: "Complex reasoning and logical deduction"
    priority: 140
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "reasoning_keywords"
    modelRefs:
      - model: "gpt-oss-120b"
        use_reasoning: true
        reasoning_effort: "high"
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: true
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5

  - name: "analysis_medium"
    description: "Analysis, comparison, and evaluation tasks"
    priority: 130
    rules:
      operator: "OR"
      conditions:
        - type: "keyword"
          name: "analysis_keywords"
    modelRefs:
      - model: "mistral-small3.2"
        use_reasoning: false
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: false
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5

  # ═══ COMPLEXITY-BASED DECISIONS ════════════════════════════
  # Fire on embedding-based complexity signal from Qwen3-Embedding.

  - name: "easy_code"
    description: "Simple coding tasks detected by complexity signal"
    priority: 115
    rules:
      operator: "AND"
      conditions:
        - type: "complexity"
          name: "code-complexity:easy"
    modelRefs:
      - model: "qwen3-8b"
        use_reasoning: false

  # ═══ DOMAIN-BASED DECISIONS (lower priority) ═══════════════
  # Fire when no keyword matched but ModernBERT classifies the domain.

  - name: "domain_stem"
    description: "STEM domains — math, CS, physics, engineering, chemistry"
    priority: 100
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "math"
        - type: "domain"
          name: "computer_science"
        - type: "domain"
          name: "physics"
        - type: "domain"
          name: "engineering"
        - type: "domain"
          name: "chemistry"
    modelRefs:
      - model: "gpt-oss-120b"
        use_reasoning: true
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: true
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5

  - name: "domain_humanities"
    description: "Humanities — history, philosophy, law"
    priority: 90
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "history"
        - type: "domain"
          name: "philosophy"
        - type: "domain"
          name: "law"
    modelRefs:
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: false

  - name: "domain_business"
    description: "Business and economics"
    priority: 80
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "business"
        - type: "domain"
          name: "economics"
    modelRefs:
      - model: "mistral-small3.2"
        use_reasoning: false

  - name: "domain_science"
    description: "Life sciences — biology, health, psychology"
    priority: 70
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "biology"
        - type: "domain"
          name: "health"
        - type: "domain"
          name: "psychology"
    modelRefs:
      - model: "mistral-small3.2"
        use_reasoning: false
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: false
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5

  - name: "easy_general"
    description: "Easy general queries detected by complexity signal"
    priority: 55
    rules:
      operator: "AND"
      conditions:
        - type: "complexity"
          name: "reasoning-complexity:easy"
        - type: "domain"
          name: "other"
    modelRefs:
      - model: "qwen3-8b"
        use_reasoning: false

  - name: "domain_general"
    description: "General/miscellaneous domain"
    priority: 50
    rules:
      operator: "OR"
      conditions:
        - type: "domain"
          name: "other"
    modelRefs:
      - model: "mistral-small3.2"
        use_reasoning: false
      - model: "Llama-3.3-70B-Instruct"
        use_reasoning: false
      - model: "gpt-oss-120b"
        use_reasoning: false
    algorithm:
      type: "confidence"
      confidence:
        confidence_method: "margin"
        threshold: 0.5
