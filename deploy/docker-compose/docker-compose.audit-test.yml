# Audit-test container — runs on different ports to avoid conflict with the
# production container (docker-compose-mymodel-1 on 8000/8080/9190).
#
# Usage:
#   cd /root/forkGO/semantic-routing
#   docker compose -f deploy/docker-compose/docker-compose.audit-test.yml up -d

services:
  mymodel-audit:
    image: mymodel:latest
    container_name: mymodel-audit-test
    ports:
      - "8001:8000"   # HTTP proxy (OpenAI-compatible API)
      - "9191:9190"   # Prometheus metrics
      - "8081:8080"   # API server (dashboard, batch classification)
    volumes:
      - ../../config.yaml:/app/config/config.yaml:ro
      - model-cache:/app/models
    environment:
      - REGOLO_API_KEY=${REGOLO_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  model-cache:
