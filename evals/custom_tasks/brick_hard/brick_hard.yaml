task: brick_hard
dataset_path: /root/forkGO/semantic-routing/evals/custom_tasks/brick_hard
test_split: test
output_type: generate_until
doc_to_text: !function utils.doc_to_text
doc_to_target: "{{answer}}"
num_fewshot: 0
generation_kwargs:
  max_gen_toks: 16384
  until:
    - "\n\nQuestion:"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
filter_list:
  - name: get_answer_letter
    filter:
      - function: regex
        regex_pattern: "(?i)(?:the answer is|best answer is|correct answer is|answer is|answer:\\s*)\\s*\\*{0,2}\\s*\\(?([A-Ja-j])\\)?\\*{0,2}|\\boption\\s+([A-Ja-j])\\b"
        group_select: -1
        fallback: "Z"
      - function: remove_whitespace
      - function: take_first
metadata:
  version: 1.0
