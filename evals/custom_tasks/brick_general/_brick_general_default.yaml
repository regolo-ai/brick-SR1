dataset_path: /home/rdseeweb/regolo-semantic-routing/forkGO/evals/custom_tasks/brick_general
test_split: test
output_type: generate_until
doc_to_text: !function utils.doc_to_text
doc_to_target: "{{answer}}"
num_fewshot: 0
generation_kwargs:
  max_gen_toks: 1024
  until:
    - "\n\nQuestion:"
    - "\n\nGiven"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
filter_list:
  - name: get_answer_letter
    filter:
      - function: regex
        regex_pattern: "(?:the answer is|best answer is)\\s*\\(?([A-Da-d])\\)?"
        group_select: 0
        fallback: "Z"
      - function: remove_whitespace
      - function: take_first
metadata:
  version: 1.0
